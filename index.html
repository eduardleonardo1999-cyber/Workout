<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='115' fill='%23111'/%3E%3Cpath d='M340 160c-18-22-46-34-74-28-12-18-32-28-54-26-40 4-68 42-62 82 2 14 8 26 16 36-10 6-18 16-20 28-4 24 12 46 36 50 4 0 8 0 12-2l6 10c8 14 24 22 40 20 14-2 26-10 32-22 16 4 34 0 46-12 20-18 22-50 4-70l18-96z' fill='none'/%3E%3Cpath d='M160 290 c-8 0-16 4-22 10-12 12-12 32 0 44 6 6 14 10 22 10h20v30c0 8 6 14 14 14s14-6 14-14v-30h14v30c0 8 6 14 14 14s14-6 14-14v-30h20c8 0 16-4 22-10 12-12 12-32 0-44-6-6-14-10-22-10h-20v-40c14-6 28-18 36-34 14-28 8-62-14-82-16-14-36-20-56-16-8-30-34-52-66-52-38 0-68 30-68 68 0 22 10 42 26 56v100z' fill='none'/%3E%3C!-- bicep arm SVG --%3E%3Cg transform='translate(80,90) scale(0.69)'%3E%3Cpath d='M320 80 C280 60 230 70 200 100 C170 130 165 170 175 205 C155 215 138 232 132 255 C120 295 142 338 182 350 C188 352 194 353 200 353 L200 400 C200 411 209 420 220 420 C231 420 240 411 240 400 L240 353 L268 353 L268 400 C268 411 277 420 288 420 C299 420 308 411 308 400 L308 353 L320 353 C360 353 393 320 393 280 C393 258 383 238 367 225 C375 210 378 192 374 174 C385 165 393 150 393 133 C393 103 368 80 340 80 Z' fill='%23c8f135'/%3E%3Cpath d='M220 180 C215 195 218 212 228 224 C215 228 205 238 202 252 L240 252 L240 220 C248 224 258 224 266 220 L266 252 L300 252 C297 238 287 228 274 224 C284 212 287 195 282 180 Z' fill='%23111' opacity='0.5'/%3E%3C/g%3E%3C/svg%3E">
<title>Workout</title>
<style>
:root{
  --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --text:#fff;--text2:rgba(235,235,245,.8);--text3:rgba(235,235,245,.6);--text4:rgba(235,235,245,.3);
  --accent:#c8f135;--accent-dim:rgba(200,241,53,.13);--accent-text:#000;
  --red:#ff453a;--orange:#ff9f0a;--blue:#0a84ff;--purple:#bf5af2;
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* HEADER */
.hdr{padding:52px 16px 0;background:var(--bg);position:sticky;top:0;z-index:60}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:.5px solid var(--border2);z-index:70;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;cursor:pointer;color:var(--text4);transition:color .15s}
.nav-tab.active{color:var(--accent)}
.nav-tab span{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* WEEK STRIP */
.wstrip{display:flex;gap:4px;padding:10px 16px 8px;background:var(--bg);position:sticky;top:86px;z-index:59;border-bottom:.5px solid var(--border)}
.day-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 2px 6px;border-radius:var(--radius-sm);cursor:pointer;border:none;background:none}
.day-pill .dl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.day-pill .dn{font-size:16px;font-weight:500;color:var(--text3)}
.day-pill .dd{width:4px;height:4px;border-radius:50%;background:var(--accent);margin:2px auto 0;opacity:0}
.day-pill.has-log .dd{opacity:1}
.day-pill.active{background:var(--accent)}
.day-pill.active .dl,.day-pill.active .dn{color:#000;font-weight:700}
.day-pill.active .dd{background:#000}
.day-pill.is-today:not(.active) .dn{color:var(--accent)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:14px 16px 100px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.page{display:none}.page.active{display:block}

/* DAY HERO */
.day-hero{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.day-icon-wrap{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-name{font-size:24px;font-weight:700;letter-spacing:-.3px}
.day-muscle{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;opacity:.65;margin-top:2px}

/* PR BANNER */
.pr-banner{background:linear-gradient(135deg,#1a2e10,#0d1c08);border:.5px solid rgba(200,241,53,.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.pr-text{font-size:13px;color:var(--accent);line-height:1.5;font-weight:500}

/* PROGRESS */
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:3px;background:var(--accent);border-radius:2px;transition:width .4s}

/* CARDS */
.card{background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--border)}
.card-body{padding:12px 14px}

/* EXERCISE NAME */
.ex-name-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.ex-name-disp{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-name-inp{font-size:15px;font-weight:600;flex:1;background:none;border:none;border-bottom:1.5px solid var(--accent);outline:none;padding:2px 0;color:var(--text);min-width:0}
.btn-edit{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;flex-shrink:0}

/* SETS — INPUT style */
.sets-head{display:grid;grid-template-columns:22px 1fr 1fr 1fr;gap:5px;margin-bottom:5px}
.sets-head span{font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.set-row{display:grid;grid-template-columns:22px 1fr 1fr 1fr;gap:5px;margin-bottom:5px;align-items:center}
.set-row:last-child{margin-bottom:0}
.set-num{height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);border-radius:6px;background:var(--bg3)}
.set-inp{height:48px;border-radius:var(--radius-xs);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;font-weight:600;text-align:center;outline:none;width:100%;-moz-appearance:textfield;transition:border-color .15s,background .15s}
.set-inp::-webkit-inner-spin-button,.set-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.set-inp:focus{border-color:var(--accent);background:var(--bg4)}
.set-inp.filled{background:var(--bg4);border-color:var(--border2)}
.set-inp.done{background:rgba(200,241,53,.12);border-color:rgba(200,241,53,.4);color:var(--accent)}
.set-inp::placeholder{color:var(--text4);font-size:15px;font-weight:400}

/* FRIDAY SUPERSET */
.ss-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ss-col-head{font-size:11px;font-weight:700;color:var(--text3);text-align:center;padding:6px 4px;background:var(--bg3);border-radius:var(--radius-xs);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.ss-sets-head{display:grid;grid-template-columns:18px 1fr 1fr 1fr;gap:3px;margin-bottom:4px}
.ss-sets-head span{font-size:9px;color:var(--text4);text-align:center;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.ss-set-row{display:grid;grid-template-columns:18px 1fr 1fr 1fr;gap:3px;margin-bottom:4px;align-items:center}
.ss-set-row:last-child{margin-bottom:0}
.ss-set-num{height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);border-radius:5px;background:var(--bg3)}
.ss-inp{height:42px;border-radius:var(--radius-xs);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:15px;font-weight:600;text-align:center;outline:none;width:100%;-moz-appearance:textfield;transition:border-color .15s,background .15s}
.ss-inp::-webkit-inner-spin-button,.ss-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.ss-inp:focus{border-color:var(--accent);background:var(--bg4)}
.ss-inp.filled{background:var(--bg4);border-color:var(--border2)}
.ss-inp.done{background:rgba(200,241,53,.12);border-color:rgba(200,241,53,.4);color:var(--accent)}
.ss-inp::placeholder{color:var(--text4);font-size:12px;font-weight:400}

/* WEEKEND */
.act-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.act-tile{padding:10px 6px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:none;color:var(--text3);font-size:12px;cursor:pointer;text-align:center;transition:all .15s;font-weight:600}
.act-tile.sel{background:var(--accent);color:#000;border-color:var(--accent)}
.act-tile-ico{display:block;margin:0 auto 5px}
.fld-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.fld-lbl{font-size:13px;color:var(--text2);min-width:76px;flex-shrink:0}
.fld-inp{flex:1;height:40px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:15px;padding:0 12px;outline:none}
.fld-inp:focus{border-color:var(--accent)}
.sect-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}

/* BOTTOM SAVE */
.save-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 70px);background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);z-index:65;display:flex;gap:9px}
.btn-save{flex:1;height:48px;border-radius:var(--radius);background:var(--accent);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;letter-spacing:-.2px}
.btn-save:active{opacity:.82;transform:scale(.98)}
.btn-plan{height:48px;width:48px;border-radius:var(--radius);background:var(--bg3);border:.5px solid var(--border2);color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* DASHBOARD */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:.5px solid var(--border);display:flex;flex-direction:column;gap:8px}
.stat-card.wide{grid-column:1/-1}
.stat-ico-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.stat-val-sm{font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.stat-lbl{font-size:12px;color:var(--text3);font-weight:500;margin-top:2px}
.heatmap-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-top:8px}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3)}
.hm-cell.lv1{background:rgba(200,241,53,.25)}
.hm-cell.lv2{background:rgba(200,241,53,.5)}
.hm-cell.lv3{background:rgba(200,241,53,.75)}
.hm-cell.lv4{background:var(--accent)}
.hm-legend{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;color:var(--text3);justify-content:flex-end}
.hm-legend .hm-cell{width:12px;height:12px;flex-shrink:0;aspect-ratio:auto}
.pr-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--border)}
.pr-list-item:last-child{border-bottom:none}
.pr-list-name{font-size:14px;color:var(--text);font-weight:500}
.pr-list-val{font-size:16px;font-weight:700;color:var(--accent)}
.vol-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vol-bar-lbl{font-size:11px;color:var(--text3);min-width:28px;text-align:right}
.vol-bar-wrap{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.vol-bar-fill{height:8px;background:var(--accent);border-radius:4px;transition:width .4s}
.vol-bar-val{font-size:11px;color:var(--text3);min-width:50px}
.dash-title{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:16px}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:17px;font-weight:700}
.cal-nav{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cal-wday-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-wday{font-size:10px;font-weight:700;color:var(--text4);text-align:center;text-transform:uppercase;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);cursor:pointer;font-weight:500;position:relative}
.cal-day.other{color:var(--text4)}
.cal-day.has-log{color:var(--text)}
.cal-day.has-log::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-day.today-ring{border:1.5px solid var(--accent)}
.cal-day.selected{background:var(--accent);color:#000;font-weight:700}
.cal-day.selected::after{background:#000}
.cal-day.today-ring.selected{border-color:transparent}

/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:80;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:16px 18px calc(44px + env(safe-area-inset-bottom,0));max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--bg4);margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:14px}
.plan-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.plan-inp{flex:1;height:42px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;padding:0 12px;outline:none}
.plan-inp:focus{border-color:var(--accent)}
.btn-rm{width:34px;height:34px;border-radius:var(--radius-xs);border:.5px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0}
.btn-add-ex{width:100%;height:42px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:none;color:var(--text3);font-size:13px;cursor:pointer;margin-top:4px}
.btn-save-plan{width:100%;height:48px;border-radius:var(--radius);background:var(--accent);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:14px}
.btn-outline{width:100%;height:44px;border-radius:var(--radius);background:none;border:.5px solid var(--border2);color:var(--text2);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-outline:active{background:var(--bg3)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);font-size:13px;font-weight:600;padding:10px 18px;border-radius:20px;z-index:100;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;border:.5px solid var(--border2)}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:32px 0;color:var(--text3);font-size:14px;line-height:1.7}
.watch-note{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm);border:.5px solid var(--border);margin-bottom:12px;font-size:12px;color:var(--text3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div class="app-title">Workout</div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="btnCal" title="Calendar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" stroke="rgba(235,235,245,.6)" stroke-width="1.8"/><path d="M8 2v4M16 2v4M3 10h18" stroke="rgba(235,235,245,.6)" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="hdr-btn" id="btnBackup" title="Backup">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="rgba(235,235,245,.6)" stroke-width="1.8"/><path d="M12 8v4l3 3" stroke="rgba(235,235,245,.6)" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="wstrip" id="wstrip"></div>

<div class="scroll">
  <div class="page active" id="pgWorkout"><div id="dayContent"></div></div>
  <div class="page" id="pgDash"><div id="dashContent"></div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <button class="nav-tab active" id="tabWorkout" onclick="switchTab('workout')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 12h2M16 12h2M8 12V8a4 4 0 018 0v4M8 12v4a4 4 0 008 0v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Workout</span>
  </button>
  <button class="nav-tab" id="tabDash" onclick="switchTab('dash')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="5" height="8" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="10" y="8" width="5" height="13" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="17" y="3" width="4" height="18" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
    <span>Progress</span>
  </button>
</nav>

<!-- SAVE BAR (workout only) -->
<div class="save-bar" id="saveBar">
  <button class="btn-plan" id="btnPlan">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M11 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5" stroke="rgba(235,235,245,.7)" stroke-width="1.8" stroke-linecap="round"/><path d="M17 3l4 4-8 8H9v-4l8-8z" stroke="rgba(235,235,245,.7)" stroke-width="1.8" stroke-linejoin="round"/></svg>
  </button>
  <button class="btn-save" id="btnSave">Save</button>
</div>

<!-- PLAN SHEET -->
<div class="overlay" id="planSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="planTitle">Edit plan</div>
    <div id="planList"></div>
    <button class="btn-add-ex" id="btnAddEx">+ Add exercise</button>
    <button class="btn-save-plan" id="btnSavePlan">Save plan</button>
  </div>
</div>

<!-- BACKUP SHEET -->
<div class="overlay" id="backupSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Backup & Restore</div>
    <button class="btn-outline" onclick="exportBackup()">⬇ Export backup (JSON)</button>
    <button class="btn-outline" onclick="document.getElementById('importFile').click()">⬆ Restore from backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
    <div style="font-size:12px;color:var(--text3);margin-top:8px;line-height:1.6">Your data is stored locally on this device. Export regularly to keep a backup — especially before switching phones.</div>
    <button class="btn-save-plan" style="margin-top:14px;background:var(--bg3);color:var(--text2)" onclick="closeSheet('backupSheet')">Close</button>
  </div>
</div>

<!-- CALENDAR SHEET -->
<div class="overlay" id="calSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="cal-hdr">
      <button class="cal-nav" id="calPrev">‹</button>

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const DAYS_S  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_F  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MUSCLE  = ['CHEST','SHOULDERS','BACK','LEGS','ARMS','–','–'];
const DAY_ICON= ['chest','shoulders','back','legs','arms','cycling','walking'];

  {ico:'shoulders',label:'Other'},
];

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
function gs(){try{return JSON.parse(localStorage.getItem('wt4')||'{}')}catch(e){return{}}}
function ss(d){localStorage.setItem('wt4',JSON.stringify(d))}

// ═══════════════════════════════════════════════════════
// DATE UTILS
// ═══════════════════════════════════════════════════════
function iso(d){return d.toISOString().slice(0,10)}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function getMon(ref){const d=new Date(ref);const dow=d.getDay();const diff=d.getDate()-dow+(dow===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d}
function weekDates(mon){return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d})}
function dayKey(date){return iso(date)+'_d'+(()=>{const dow=date.getDay();return dow===0?6:dow-1})()}
function dowFromDate(date){const d=date.getDay();return d===0?6:d-1}

let viewMon = getMon(new Date());
let curDate  = new Date();
let editingDay = -1;
let calViewY, calViewM;
let currentTab = 'workout';

// ═══════════════════════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.getElementById('pgWorkout').classList.toggle('active',tab==='workout');
  document.getElementById('pgDash').classList.toggle('active',tab==='dash');
  document.getElementById('tabWorkout').classList.toggle('active',tab==='workout');
  document.getElementById('tabDash').classList.toggle('active',tab==='dash');
  document.getElementById('saveBar').style.display=tab==='workout'?'flex':'none';
  if(tab==='dash') renderDash();
}

// ═══════════════════════════════════════════════════════
// WEEK STRIP
// ═══════════════════════════════════════════════════════
function buildStrip(){
  const strip=document.getElementById('wstrip');strip.innerHTML='';
  const dates=weekDates(viewMon);
  const store=gs();const todayStr=iso(new Date());const curStr=iso(curDate);
  dates.forEach((d,i)=>{
    const dk=dayKey(d);const ds=iso(d);
    const hasData=store[dk]&&((store[dk].sets&&Object.values(store[dk].sets).some(s=>s.reps>0))||(store[dk].activity&&store[dk].activity.type));
    const pill=document.createElement('button');
    let cls='day-pill';
    if(ds===curStr)cls+=' active';
    if(ds===todayStr&&ds!==curStr)cls+=' is-today';
    if(hasData)cls+=' has-log';
    pill.className=cls;
    pill.innerHTML=`<span class="dl">${DAYS_S[i]}</span><span class="dn">${d.getDate()}</span><span class="dd"></span>`;
    pill.onclick=()=>{curDate=new Date(d);buildStrip();renderDay()};
    strip.appendChild(pill);
  });
  const dow=dowFromDate(curDate);
  const sub=iso(curDate)===iso(new Date())?'Today':curDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.querySelector('.app-title').textContent='Workout';
}

// ═══════════════════════════════════════════════════════
// RENDER DAY
// ═══════════════════════════════════════════════════════
function renderDay(){
  buildStrip();
  const dow=dowFromDate(curDate);
  const dk=dayKey(curDate);
  const store=gs();const dayData=store[dk]||{};
  const content=document.getElementById('dayContent');
  if(WEEKEND.includes(dow))renderWeekend(content,dayData,dow);
  else renderWeekday(content,dayData,dow,store,dk);
}

// ═══════════════════════════════════════════════════════
// WEEKDAY
// ═══════════════════════════════════════════════════════
function renderWeekday(container,dayData,idx,store,dk){
  const plan=(store.plans||{})[idx]||[];
  const sets=dayData.sets||{};
  const prs=checkPRs(idx,dk,sets,plan,store);
  let done=0;const total=plan.length*4;
  plan.forEach((_,ei)=>{for(let s=0;s<4;s++){const k=`${ei}_${s}`;if(sets[k]&&sets[k].reps>0)done++}});
  const pct=total?Math.round(done/total*100):0;
  const clr=DAY_CLR[idx];
  const isFri=(idx===4);

  let html=`<div class="day-hero">
    <div class="day-icon-wrap" style="background:${clr}1a;border:.5px solid ${clr}44">${ICONS[DAY_ICON[idx]]}</div>
    <div><div class="day-name">${DAYS_F[idx]}</div><div class="day-muscle" style="color:${clr}">${MUSCLE[idx]} WORKOUT</div></div>
  </div>`;

  if(prs.length)html+=`<div class="pr-banner"><div style="flex-shrink:0">${ICONS.pr_ico}</div><div class="pr-text">${prs.join('<br>')}</div></div>`;
  if(total)html+=`<div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>`;

  if(!plan.length){
    html+=`<div class="empty-state"><div style="margin-bottom:10px">${ICONS[DAY_ICON[idx]]}</div>No exercises planned yet.<br>Tap the edit button below to set up ${DAYS_F[idx]}'s workout.</div>`;
  } else if(isFri){
    html+=renderFriday(plan,sets,idx);
  } else {
    plan.forEach((name,ei)=>{ html+=renderExCard(name,ei,sets,idx,false); });
  }
  container.innerHTML=html;
  document.getElementById('btnPlan').style.display='flex';
  document.getElementById('btnSave').textContent='Save day';
}

function renderExCard(name,ei,sets,idx,compact){
  const cls=compact?'ss-inp':'set-inp';
  const rowCls=compact?'ss-set-row':'set-row';
  const numCls=compact?'ss-set-num':'set-num';
  const headCls=compact?'ss-sets-head':'sets-head';
  let rows='';
  for(let s=0;s<4;s++){
    const k=`${ei}_${s}`;const sv=sets[k]||{};
    const isDone=sv.reps>0&&sv.kg>0;
    const rC=isDone?'done':(sv.reps>0?'filled':'');
    const kC=isDone?'done':(sv.kg>0?'filled':'');
    const aC=sv.asst>0?'filled':'';
    rows+=`<div class="${rowCls}">
      <div class="${numCls}">${s+1}</div>
      <input class="${cls} ${rC}" type="number" inputmode="decimal" placeholder="–" value="${sv.reps>0?sv.reps:''}" data-ei="${ei}" data-s="${s}" data-t="r" data-day="${idx}" onchange="saveInp(this)" onfocus="this.select()">
      <input class="${cls} ${kC}" type="number" inputmode="decimal" placeholder="–" value="${sv.kg>0?sv.kg:''}" data-ei="${ei}" data-s="${s}" data-t="k" data-day="${idx}" onchange="saveInp(this)" onfocus="this.select()">
      <input class="${cls} ${aC}" type="number" inputmode="decimal" placeholder="–" value="${sv.asst>0?sv.asst:''}" data-ei="${ei}" data-s="${s}" data-t="a" data-day="${idx}" onchange="saveInp(this)" onfocus="this.select()">
    </div>`;
  }
  const editStyle=`display:none;font-size:15px;font-weight:600;flex:1;background:none;border:none;border-bottom:1.5px solid var(--accent);outline:none;padding:2px 0;color:var(--text);min-width:0`;
  return `<div class="card">
    <div class="card-head">
      <div class="ex-name-wrap">
        <span class="ex-name-disp" id="exd_${idx}_${ei}">${name||'Exercise'}</span>
        <input class="ex-name-inp" id="exe_${idx}_${ei}" value="${name||''}" style="${editStyle}" placeholder="Exercise name" onblur="saveExName(${idx},${ei})" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <button class="btn-edit" onclick="toggleName(${idx},${ei})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M11 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5" stroke="rgba(235,235,245,.5)" stroke-width="1.8" stroke-linecap="round"/><path d="M17 3l4 4-8 8H9v-4l8-8z" stroke="rgba(235,235,245,.5)" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="card-body">
      <div class="${headCls}"><span></span><span>Reps</span><span>Kg</span><span>+Help</span></div>
      ${rows}
    </div>
  </div>`;
}

function renderFriday(plan,sets,idx){
  const half=Math.ceil(plan.length/2);
  const bic=plan.slice(0,half);const tri=plan.slice(half);
  let html=`<div class="ss-wrap">`;
  html+=`<div><div class="ss-col-head" style="color:#bf5af2">Biceps</div>`;
  bic.forEach((n,i)=>{ html+=renderExCard(n,i,sets,idx,true); });
  html+=`</div><div><div class="ss-col-head" style="color:#ff9f0a">Triceps</div>`;
  tri.forEach((n,i)=>{ html+=renderExCard(n,half+i,sets,idx,true); });
  html+=`</div></div>`;
  return html;
}

// ═══════════════════════════════════════════════════════
// INPUT SAVE
// ═══════════════════════════════════════════════════════
function saveInp(input){
  const ei=input.dataset.ei;const s=input.dataset.s;const t=input.dataset.t;const dayI=parseInt(input.dataset.day);
  const val=parseFloat(input.value)||0;
  const store=gs();const dk=dayKey(curDate);
  if(!store[dk])store[dk]={};if(!store[dk].sets)store[dk].sets={};
  const k=`${ei}_${s}`;if(!store[dk].sets[k])store[dk].sets[k]={};
  if(t==='r')store[dk].sets[k].reps=val;
  else if(t==='k')store[dk].sets[k].kg=val;
  else store[dk].sets[k].asst=val;
  ss(store);
  const sv=store[dk].sets[k];
  const isDone=sv.reps>0&&sv.kg>0;
  const filled=val>0;
  input.classList.toggle('filled',filled&&!isDone);
  input.classList.toggle('done',isDone);
  // update sibling styling
  const isFri=(dayI===4);const inpCls=isFri?'ss-inp':'set-inp';
  ['r','k','a'].forEach(type=>{
    const sib=document.querySelector(`input[data-ei="${ei}"][data-s="${s}"][data-t="${type}"][data-day="${dayI}"]`);
    if(!sib)return;
    const sibVal=parseFloat(sib.value)||0;
    sib.classList.toggle('done',isDone&&(type==='r'||type==='k'));
    sib.classList.toggle('filled',sibVal>0&&!isDone);
  });
  updateProg();buildStrip();
}

function updateProg(){
  const store=gs();const dk=dayKey(curDate);const dow=dowFromDate(curDate);
  const plan=(store.plans||{})[dow]||[];const sets=(store[dk]||{}).sets||{};
  let done=0,total=plan.length*4;
  plan.forEach((_,ei)=>{for(let s=0;s<4;s++){const k=`${ei}_${s}`;if(sets[k]&&sets[k].reps>0)done++}});
  const bar=document.querySelector('.prog-bar');if(bar)bar.style.width=(total?Math.round(done/total*100):0)+'%';
}

// ═══════════════════════════════════════════════════════
// PR DETECTION
// ═══════════════════════════════════════════════════════
function checkPRs(dayIdx,curDk,curSets,plan,store){
  const msgs=[];
  const pastKeys=Object.keys(store).filter(k=>k!==curDk&&k.endsWith('_d'+dayIdx)&&store[k]&&store[k].sets);
  plan.forEach((name,ei)=>{
    let bestReps=0,bestKg=0;
    pastKeys.forEach(pk=>{
      for(let s=0;s<4;s++){
        const ps=(store[pk].sets||{})[`${ei}_${s}`]||{};
        if((ps.reps||0)>bestReps)bestReps=ps.reps||0;
        if((ps.kg||0)>bestKg)bestKg=ps.kg||0;
      }
    });
    let repsToday=0,kgToday=0;
    for(let s=0;s<4;s++){const cs=curSets[`${ei}_${s}`]||{};if((cs.reps||0)>repsToday)repsToday=cs.reps||0;if((cs.kg||0)>kgToday)kgToday=cs.kg||0;}
    if(bestReps>0&&repsToday>bestReps)msgs.push(`New rep PR — ${name||'Exercise '+(ei+1)}: ${repsToday} reps! 🎉`);
    if(bestKg>0&&kgToday>bestKg)msgs.push(`New weight PR — ${name||'Exercise '+(ei+1)}: ${kgToday}kg! 💪`);
  });
  return [...new Set(msgs)].slice(0,3);
}

// ═══════════════════════════════════════════════════════

function toggleName(di,ei){
  const disp=document.getElementById(`exd_${di}_${ei}`);

  if(inp.style.display!=='none'){inp.blur();return}
  disp.style.display='none';inp.style.display='';inp.focus();inp.select();
}
function saveExName(di,ei){
  const inp=document.getElementById(`exe_${di}_${ei}`);
  const disp=document.getElementById(`exd_${di}_${ei}`);
  const name=inp.value.trim()||'Exercise';
  inp.value=name;disp.textContent=name;
  inp.style.display='none';disp.style.display='';
  const store=gs();if(!store.plans)store.plans={};
  if(!store.plans[di])store.plans[di]=[];
  store.plans[di][ei]=name;ss(store);
  showToast('Name saved ✓');
}

    <div class="sect-lbl" style="margin-top:12px">Details</div>
    <div class="fld-row"><span class="fld-lbl">Duration</span><input class="fld-inp" type="text" id="aDur" placeholder="e.g. 45 min" value="${act.dur||''}" oninput="liveAct()"></div>
    <div class="fld-row"><span class="fld-lbl">Distance</span><input class="fld-inp" type="text" id="aDist" placeholder="e.g. 12 km" value="${act.dist||''}" oninput="liveAct()"></div>
    <div class="fld-row"><span class="fld-lbl">Calories</span><input class="fld-inp" type="number" inputmode="numeric" id="aCal" placeholder="from Watch" value="${act.cal||''}" oninput="liveAct()"></div>
    <div class="fld-row"><span class="fld-lbl">Notes</span><input class="fld-inp" type="text" id="aNote" placeholder="How did it feel?" value="${act.note||''}" oninput="liveAct()"></div>
  </div></div>`;
  container.innerHTML=html;
  document.getElementById('btnPlan').style.display='none';
  document.getElementById('btnSave').textContent='Save activity';
}
function selAct(t){
  const store=gs();const dk=dayKey(curDate);
  if(!store[dk])store[dk]={};if(!store[dk].activity)store[dk].activity={};
  store[dk].activity.type=t;ss(store);
  document.querySelectorAll('.act-tile').forEach(b=>b.classList.toggle('sel',b.textContent.trim().includes(t)));
}
function liveAct(){
  const store=gs();const dk=dayKey(curDate);
  if(!store[dk])store[dk]={};if(!store[dk].activity)store[dk].activity={};
  const a=store[dk].activity;
  a.dur=document.getElementById('aDur')?.value||'';
  a.dist=document.getElementById('aDist')?.value||'';
  a.cal=document.getElementById('aCal')?.value||'';
  a.note=document.getElementById('aNote')?.value||'';
  ss(store);
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDash(){
  const store=gs();const allKeys=Object.keys(store).filter(k=>k.includes('_d')&&store[k]);
  const workoutKeys=allKeys.filter(k=>store[k].sets&&Object.values(store[k].sets).some(s=>s.reps>0));
  const totalW=workoutKeys.length;

  // total volume
  let totalVol=0;
  workoutKeys.forEach(k=>{
    Object.values(store[k].sets||{}).forEach(s=>{ totalVol+=(s.reps||0)*(s.kg||0); });
  });

  // streak
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const dow=d.getDay()===0?6:d.getDay()-1;
    if(WEEKEND.includes(dow))continue;
    const dk=dayKey(d);
    if(store[dk]&&store[dk].sets&&Object.values(store[dk].sets).some(s=>s.reps>0))streak++;
    else if(i>0)break;
  }

  // PRs per exercise
  const prMap={};
  workoutKeys.forEach(k=>{
    const dow=parseInt(k.slice(-1));
    const plan=(store.plans||{})[dow]||[];
    Object.entries(store[k].sets||{}).forEach(([key,sv])=>{
      const ei=parseInt(key.split('_')[0]);
      const name=plan[ei]||'Exercise '+(ei+1);
      if(!prMap[name]||sv.kg>prMap[name])prMap[name]=sv.kg||0;
    });
  });
  const topPRs=Object.entries(prMap).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // heatmap — last 91 days (13 weeks)
  const heatCells=[];
  for(let i=90;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const dk=dayKey(d);
    const has=store[dk]&&store[dk].sets&&Object.values(store[dk].sets).some(s=>s.reps>0);
    const vol=has?Object.values(store[dk].sets).reduce((sum,s)=>(sum+(s.reps||0)*(s.kg||0)),0):0;
    let lv=0;if(vol>0)lv=1;if(vol>2000)lv=2;if(vol>5000)lv=3;if(vol>10000)lv=4;
    heatCells.push(lv);
  }

  // weekly volume for last 8 weeks
  const weekVols=[];
  for(let w=7;w>=0;w--){
    const wMon=getMon(new Date());wMon.setDate(wMon.getDate()-w*7);
    const wDates=weekDates(wMon);
    let vol=0;
    wDates.forEach(d=>{
      const dk=dayKey(d);
      if(store[dk]&&store[dk].sets)Object.values(store[dk].sets).forEach(s=>{vol+=(s.reps||0)*(s.kg||0)});
    });
    const lbl=wMon.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    weekVols.push({lbl,vol});
  }
  const maxVol=Math.max(...weekVols.map(w=>w.vol),1);

  let html=`<div class="dash-title">Progress</div>`;

  // STAT CARDS
  html+=`<div class="stat-grid">
    <div class="stat-card">
      <div class="stat-ico-wrap" style="background:#c8f13518">${ICONS.streak}</div>
      <div><div class="stat-val">${streak}</div><div class="stat-lbl">Day Streak</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-ico-wrap" style="background:#c8f13518">${ICONS.lift}</div>
      <div><div class="stat-val">${totalW}</div><div class="stat-lbl">Workouts</div></div>
    </div>
    <div class="stat-card wide">
      <div class="stat-ico-wrap" style="background:#c8f13518">${ICONS.trophy}</div>
      <div><div class="stat-val">${totalVol>=1000?(totalVol/1000).toFixed(1)+'k':totalVol}<span style="font-size:16px;font-weight:500;color:var(--text3)"> kg lifted</span></div><div class="stat-lbl">Total volume</div></div>
    </div>
  </div>`;

  // HEATMAP
  html+=`<div class="card"><div class="card-body">
    <div class="sect-lbl">Activity heatmap — last 13 weeks</div>
    <div class="heatmap-grid">`;
  heatCells.forEach(lv=>{ html+=`<div class="hm-cell${lv?` lv${lv}`:''}"></div>`; });
  html+=`</div>
    <div class="hm-legend">Less <div class="hm-cell"></div><div class="hm-cell lv1"></div><div class="hm-cell lv2"></div><div class="hm-cell lv3"></div><div class="hm-cell lv4"></div> More</div>
  </div></div>`;

  // WEEKLY VOLUME BARS
  html+=`<div class="card"><div class="card-body">
    <div class="sect-lbl">Weekly volume</div>`;
  weekVols.forEach(w=>{
    const pct=Math.round(w.vol/maxVol*100);
    const lbl=w.vol>=1000?(w.vol/1000).toFixed(1)+'k':(w.vol||'–');
    html+=`<div class="vol-bar-row">
      <span class="vol-bar-lbl">${w.lbl}</span>
      <div class="vol-bar-wrap"><div class="vol-bar-fill" style="width:${pct}%"></div></div>
      <span class="vol-bar-val" style="font-size:11px;color:var(--text3)">${lbl}${w.vol?'kg':''}</span>
    </div>`;
  });
  html+=`</div></div>`;

  // TOP PRs
  html+=`<div class="card"><div class="card-body">
    <div class="sect-lbl">Personal records</div>`;
  if(topPRs.length){
    topPRs.forEach(([name,kg])=>{
      html+=`<div class="pr-list-item"><div style="display:flex;align-items:center;gap:8px">${ICONS.pr_ico}<span class="pr-list-name">${name}</span></div><span class="pr-list-val">${kg}kg</span></div>`;
    });
  } else {
    html+=`<div style="font-size:13px;color:var(--text3);padding:8px 0">Log some workouts to see PRs here.</div>`;
  }
  html+=`</div></div>`;

  document.getElementById('dashContent').innerHTML=html;
}

// ═══════════════════════════════════════════════════════
// PLAN SHEET
// ═══════════════════════════════════════════════════════
document.getElementById('btnPlan').onclick=function(){
  editingDay=dowFromDate(curDate);openPlan();
};
document.getElementById('planSheet').onclick=function(e){if(e.target===this)closeSheet('planSheet')};
function openPlan(){
  const store=gs();const plan=(store.plans||{})[editingDay]||['','','',''];
  document.getElementById('planTitle').textContent=`${DAYS_F[editingDay]} — exercises`;
  const list=document.getElementById('planList');list.innerHTML='';
  plan.forEach(ex=>addPlanRow(list,ex));
  document.getElementById('planSheet').classList.add('open');
}
function addPlanRow(list,val){
  const row=document.createElement('div');row.className='plan-row';
  row.innerHTML=`<input class="plan-inp" type="text" placeholder="Exercise name" value="${val||''}">
    <button class="btn-rm" onclick="this.parentNode.remove()">✕</button>`;
  list.appendChild(row);
}
document.getElementById('btnAddEx').onclick=function(){addPlanRow(document.getElementById('planList'),'')};
document.getElementById('btnSavePlan').onclick=function(){
  const store=gs();if(!store.plans)store.plans={};
  store.plans[editingDay]=Array.from(document.querySelectorAll('.plan-inp')).map(i=>i.value.trim()).filter(Boolean);
  ss(store);closeSheet('planSheet');renderDay();showToast('Plan saved ✓');
};

// ═══════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════
document.getElementById('btnSave').onclick=function(){
  if(WEEKEND.includes(dowFromDate(curDate)))liveAct();
  showToast('Saved ✓');buildStrip();
};

// ═══════════════════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════════════════
document.getElementById('btnBackup').onclick=function(){document.getElementById('backupSheet').classList.add('open')};
document.getElementById('backupSheet').onclick=function(e){if(e.target===this)closeSheet('backupSheet')};
function exportBackup(){
  const data=gs();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date();a.download=`workout-backup-${iso(d)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('Backup exported ✓');closeSheet('backupSheet');
}
function importBackup(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      ss(data);closeSheet('backupSheet');renderDay();buildStrip();showToast('Backup restored ✓');
    }catch{showToast('Invalid backup file');}
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════
document.getElementById('btnCal').onclick=function(){
  const now=new Date();calViewY=now.getFullYear();calViewM=now.getMonth();
  renderCal();document.getElementById('calSheet').classList.add('open');
};
document.getElementById('calSheet').onclick=function(e){if(e.target===this)closeSheet('calSheet')};
document.getElementById('calPrev').onclick=function(){calViewM--;if(calViewM<0){calViewM=11;calViewY--}renderCal()};
document.getElementById('calNext').onclick=function(){calViewM++;if(calViewM>11){calViewM=0;calViewY++}renderCal()};
function renderCal(){
  ['M','T','W','T','F','S','S'].forEach((w,i)=>{
    document.getElementById('calWdays').innerHTML=['M','T','W','T','F','S','S'].map(w=>`<div class="cal-wday">${w}</div>`).join('');
  });
  const store=gs();const todayStr=iso(new Date());const curStr=iso(curDate);
  document.getElementById('calMonthLbl').textContent=new Date(calViewY,calViewM,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(calViewY,calViewM,1);
  let startDow=first.getDay();startDow=startDow===0?6:startDow-1;
  const dim=new Date(calViewY,calViewM+1,0).getDate();
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=dim;d++){
    const date=new Date(calViewY,calViewM,d);const ds=iso(date);
    const dk=dayKey(date);
    const hasLog=store[dk]&&((store[dk].sets&&Object.values(store[dk].sets).some(s=>s.reps>0))||(store[dk].activity&&store[dk].activity.type));
    let cls='cal-day';
    if(ds===todayStr)cls+=' today-ring';
    if(ds===curStr)cls+=' selected';
    if(hasLog)cls+=' has-log';
    cells+=`<div class="${cls}" onclick="calGo('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=cells;
}
function calGo(ds){
  curDate=new Date(ds+'T12:00:00');viewMon=getMon(new Date(curDate));
  closeSheet('calSheet');switchTab('workout');buildStrip();renderDay();
}

// UTILS
// ═══════════════════════════════════════════════════════
function closeSheet(id){document.getElementById(id).classList.remove('open')}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);
}
