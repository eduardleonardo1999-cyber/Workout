<title>Workout</title>
<style>
:root{
  --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --text:#fff;--text2:rgba(235,235,245,.8);--text3:rgba(235,235,245,.6);--text4:rgba(235,235,245,.3);
  --accent:#c8f135;
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.hdr{padding:52px 16px 0;background:var(--bg);position:sticky;top:0;z-index:60}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:.5px solid var(--border2);z-index:70;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;cursor:pointer;color:var(--text4);transition:color .15s}
.nav-tab.active{color:var(--accent)}
.nav-tab span{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.wstrip{display:flex;gap:4px;padding:10px 16px 8px;background:var(--bg);position:sticky;top:86px;z-index:59;border-bottom:.5px solid var(--border)}
.day-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 2px 6px;border-radius:var(--radius-sm);cursor:pointer;border:none;background:none}
.day-pill .dl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.day-pill .dn{font-size:16px;font-weight:500;color:var(--text3)}
.day-pill .dd{width:4px;height:4px;border-radius:50%;background:var(--accent);margin:2px auto 0;opacity:0}
.day-pill.has-log .dd{opacity:1}
.day-pill.active{background:var(--accent)}
.day-pill.active .dl,.day-pill.active .dn{color:#000;font-weight:700}
.day-pill.active .dd{background:#000}
.day-pill.is-today:not(.active) .dn{color:var(--accent)}
.scroll{flex:1;overflow-y:auto;padding:14px 16px 100px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.page{display:none}.page.active{display:block}
.day-hero{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.day-icon-wrap{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-name{font-size:24px;font-weight:700;letter-spacing:-.3px}
.day-muscle{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;opacity:.65;margin-top:2px}
.pr-banner{background:linear-gradient(135deg,#1a2e10,#0d1c08);border:.5px solid rgba(200,241,53,.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.pr-text{font-size:13px;color:var(--accent);line-height:1.5;font-weight:500}
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:3px;background:var(--accent);border-radius:2px;transition:width .4s}
.card{background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--border)}
.card-body{padding:12px 14px}
.ex-name-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.ex-name-disp{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-name-inp{font-size:15px;font-weight:600;flex:1;background:none;border:none;border-bottom:1.5px solid var(--accent);outline:none;padding:2px 0;color:var(--text);min-width:0;display:none}
.btn-edit{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;flex-shrink:0}
.sets-head{display:grid;grid-template-columns:22px 1fr 1fr 1fr;gap:5px;margin-bottom:5px}
.sets-head span{font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.set-row{display:grid;grid-template-columns:22px 1fr 1fr 1fr;gap:5px;margin-bottom:5px;align-items:center}
.set-row:last-child{margin-bottom:0}
.set-num{height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);border-radius:6px;background:var(--bg3)}
.set-inp{height:48px;border-radius:var(--radius-xs);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;font-weight:600;text-align:center;outline:none;width:100%;-moz-appearance:textfield;transition:border-color .15s,background .15s}
.set-inp::-webkit-inner-spin-button,.set-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.set-inp:focus{border-color:var(--accent);background:var(--bg4)}
.set-inp.filled{background:var(--bg4);border-color:var(--border2)}
.set-inp.done{background:rgba(200,241,53,.12);border-color:rgba(200,241,53,.4);color:var(--accent)}
.set-inp::placeholder{color:var(--text4);font-size:15px;font-weight:400}
.ss-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ss-col-head{font-size:11px;font-weight:700;color:var(--text3);text-align:center;padding:6px 4px;background:var(--bg3);border-radius:var(--radius-xs);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.ss-sets-head{display:grid;grid-template-columns:16px 1fr 1fr 1fr;gap:3px;margin-bottom:4px}
.ss-sets-head span{font-size:9px;color:var(--text4);text-align:center;text-transform:uppercase;font-weight:600}
.ss-set-row{display:grid;grid-template-columns:16px 1fr 1fr 1fr;gap:3px;margin-bottom:4px;align-items:center}
.ss-set-row:last-child{margin-bottom:0}
.ss-set-num{height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);border-radius:5px;background:var(--bg3)}
.ss-inp{height:42px;border-radius:var(--radius-xs);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:15px;font-weight:600;text-align:center;outline:none;width:100%;-moz-appearance:textfield;transition:border-color .15s,background .15s}
.ss-inp::-webkit-inner-spin-button,.ss-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.ss-inp:focus{border-color:var(--accent);background:var(--bg4)}
.ss-inp.filled{background:var(--bg4);border-color:var(--border2)}
.ss-inp.done{background:rgba(200,241,53,.12);border-color:rgba(200,241,53,.4);color:var(--accent)}
.act-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.act-tile{padding:10px 6px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:none;color:var(--text3);font-size:12px;cursor:pointer;text-align:center;transition:all .15s;font-weight:600}
.act-tile.sel{background:var(--accent);color:#000;border-color:var(--accent)}
.act-tile-ico{font-size:22px;display:block;margin-bottom:3px}
.fld-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.fld-lbl{font-size:13px;color:var(--text2);min-width:76px;flex-shrink:0}
.fld-inp{flex:1;height:40px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:15px;padding:0 12px;outline:none}
.fld-inp:focus{border-color:var(--accent)}
.sect-lbl{font-size:11px;font-weight:700;color:#c8f135;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.save-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 62px);background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);z-index:65;display:flex;gap:9px}
.btn-save{flex:1;height:48px;border-radius:var(--radius);background:var(--accent);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer}
.btn-save:active{opacity:.82;transform:scale(.98)}
.btn-plan{height:48px;width:48px;border-radius:var(--radius);background:var(--bg3);border:.5px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dash-title{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.dash-sub{font-size:13px;color:#c8f135;opacity:.7;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:.5px solid var(--border)}
.stat-card.wide{grid-column:1/-1;display:flex;align-items:center;gap:16px}
.stat-ico{font-size:28px;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stat-lbl{font-size:12px;color:var(--text3);font-weight:500;margin-top:3px}
.stat-desc{font-size:11px;color:var(--text4);margin-top:2px}
.hm-outer{display:flex;gap:3px;overflow-x:auto}
.hm-outer::-webkit-scrollbar{display:none}
.hm-col{display:flex;flex-direction:column;gap:3px}
.hm-col-lbl{font-size:8px;color:var(--text4);text-align:center;height:12px;margin-bottom:2px;white-space:nowrap}
.hm-cell{width:14px;height:14px;border-radius:3px;background:var(--bg3);flex-shrink:0}
.hm-cell.lv1{background:rgba(200,241,53,.3)}
.hm-cell.lv2{background:rgba(200,241,53,.55)}
.hm-cell.lv3{background:rgba(200,241,53,.8)}
.hm-cell.lv4{background:var(--accent)}
.hm-left{display:flex;flex-direction:column;gap:3px;margin-top:14px;margin-right:3px;flex-shrink:0}
.hm-row-lbl{font-size:9px;color:var(--text4);font-weight:600;height:14px;display:flex;align-items:center;min-width:10px}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:10px;color:var(--text4);justify-content:flex-end}
.hm-legend .hm-cell{width:10px;height:10px}
.vol-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.vol-wlbl{font-size:11px;color:var(--text3);min-width:56px;flex-shrink:0}
.vol-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.vol-bar-fill{height:8px;background:var(--accent);border-radius:4px}
.vol-val{font-size:11px;color:var(--text3);min-width:52px;text-align:right}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--border)}
.pr-row:last-child{border-bottom:none}
.pr-name{font-size:14px;color:var(--text);font-weight:500}
.pr-val{font-size:16px;font-weight:700;color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:80;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:16px 18px calc(44px + env(safe-area-inset-bottom,0));max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--bg4);margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:14px}
.plan-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.plan-inp{flex:1;height:42px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;padding:0 12px;outline:none}
.plan-inp:focus{border-color:var(--accent)}
.btn-rm{width:34px;height:34px;border-radius:var(--radius-xs);border:.5px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0}
.btn-add-ex{width:100%;height:42px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:none;color:var(--text3);font-size:13px;cursor:pointer;margin-top:4px}
.btn-save-plan{width:100%;height:48px;border-radius:var(--radius);background:var(--accent);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:14px}
.btn-outline{width:100%;height:44px;border-radius:var(--radius);background:none;border:.5px solid var(--border2);color:var(--text2);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);font-size:13px;font-weight:600;padding:10px 18px;border-radius:20px;z-index:100;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;border:.5px solid var(--border2)}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:32px 0;color:var(--text3);font-size:14px;line-height:1.7}
.watch-note{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm);border:.5px solid var(--border);margin-bottom:12px;font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div class="app-title" id="pageTitle">Workout</div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="btnCal"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" stroke="rgba(235,235,245,.6)" stroke-width="1.8"/><path d="M8 2v4M16 2v4M3 10h18" stroke="rgba(235,235,245,.6)" stroke-width="1.8" stroke-linecap="round"/></svg></button>
      <button class="hdr-btn" id="btnBackup"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3v9m0 0l-3-3m3 3l3-3" stroke="rgba(235,235,245,.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17v1a3 3 0 003 3h12a3 3 0 003-3v-1" stroke="rgba(235,235,245,.6)" stroke-width="1.8" stroke-linecap="round"/></svg></button>
    </div>
  </div>
</div>
<div class="wstrip" id="wstrip"></div>
<div class="scroll">
  <div class="page active" id="pgWorkout"><div id="dayContent"></div></div>
  <div class="page" id="pgDash"><div id="dashContent"></div></div>
</div>
<nav class="bot-nav">
  <button class="nav-tab active" id="tabWorkout" onclick="switchTab('workout')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="3" height="5" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="16" y="10" width="3" height="5" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="8" y="8" width="3" height="9" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="8" width="3" height="9" rx="1.5" stroke="currentColor" stroke-width="1.8"/><path d="M11 12h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Workout</span>
  </button>
  <button class="nav-tab" id="tabDash" onclick="switchTab('dash')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="4" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="10" y="8" width="4" height="13" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="17" y="4" width="4" height="17" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>
    <span>Progress</span>
  </button>
</nav>
<div class="save-bar" id="saveBar">
  <button class="btn-plan" id="btnPlan"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M11 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5" stroke="rgba(235,235,245,.7)" stroke-width="1.8" stroke-linecap="round"/><path d="M17 3l4 4-8 8H9v-4l8-8z" stroke="rgba(235,235,245,.7)" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
  <button class="btn-save" id="btnSave">Save</button>
</div>
<div class="overlay" id="planSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="planTitle">Edit plan</div>
    <div id="planList"></div>
    <button class="btn-add-ex" id="btnAddEx">+ Add exercise</button>
    <button class="btn-save-plan" id="btnSavePlan">Save plan</button>
  </div>
</div>
<div class="overlay" id="backupSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Backup &amp; Restore</div>

    <button class="btn-outline" onclick="exportBackup()">&#11015; Export backup (JSON)</button>
    <div style="font-size:12px;color:var(--text3);margin-top:4px;margin-bottom:16px;line-height:1.5">Saves all your workout data as a JSON file.</div>

    <div style="height:.5px;background:var(--border);margin-bottom:16px"></div>
    <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">&#11014; Restore from backup</div>

    <div style="font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.5">Option 1 — pick your JSON file directly:</div>
    <label style="display:block;width:100%;height:44px;border-radius:var(--radius);border:.5px solid var(--border2);background:none;color:var(--text2);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
      &#128193; Choose backup file
      <input type="file" accept=".json,application/json" style="display:none" onchange="importBackup(event)">
    </label>

    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;line-height:1.5">Option 2 — paste JSON text (open file in Notes, copy all, paste here):</div>
    <textarea id="restoreArea" placeholder="Paste JSON here..." style="width:100%;height:80px;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:12px;padding:10px;outline:none;resize:none;font-family:monospace"></textarea>
    <button class="btn-save-plan" style="margin-top:6px" onclick="restoreFromText()">Restore from text</button>

    <div style="height:.5px;background:var(--border);margin:14px 0"></div>
    <div style="font-size:11px;color:var(--text3);line-height:1.5">Data is stored locally. Export regularly, especially before switching phones.</div>
    <button class="btn-save-plan" style="margin-top:12px;background:var(--bg3);color:var(--text2)" onclick="closeSheet('backupSheet')">Close</button>
  </div>
</div>
<div class="overlay" id="calSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;width:32px;height:32px" id="calPrev">&#8249;</button>
      <span style="font-size:17px;font-weight:700" id="calMonthLbl"></span>
      <button style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;width:32px;height:32px" id="calNext">&#8250;</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px" id="calWdays"></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px" id="calGrid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var DAYS_S=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var DAYS_F=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var MUSCLE_LABEL=["CHEST","SHOULDERS","BACK","LEGS","ARMS","-","-"];
var DAY_CLR=["#ff375f","#ff9f0a","#30d158","#0a84ff","#bf5af2","#64d2ff","#5e5ce6"];
var WEEKEND=[5,6];
var ACT_TYPES=[
  {ico:"\uD83D\uDEB4",label:"Cycling"},
  {ico:"\uD83D\uDEB6",label:"Walking"},
  {ico:"\uD83C\uDFC3",label:"Running"},
  {ico:"\uD83E\uDDD8",label:"Yoga"},
  {ico:"\uD83C\uDFCA",label:"Swimming"},
  {ico:"\u26A1",label:"Other"}
];
var MUSCLE_SVG={
  chest:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><path d="M8 18 C8 18 16 14 28 18 C40 14 48 18 48 18 L46 36 C46 36 38 32 28 36 C18 32 10 36 10 36 Z" fill="#c8f135"/><line x1="28" y1="18" x2="28" y2="36" stroke="#111" stroke-width="1.5" opacity="0.5"/></svg>',
  shoulders:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><circle cx="28" cy="16" r="8" fill="#c8f135"/><circle cx="10" cy="26" r="7" fill="#c8f135" opacity="0.8"/><circle cx="46" cy="26" r="7" fill="#c8f135" opacity="0.8"/><path d="M17 26 C20 21 24 18 28 18" stroke="#c8f135" stroke-width="2.5" stroke-linecap="round"/><path d="M39 26 C36 21 32 18 28 18" stroke="#c8f135" stroke-width="2.5" stroke-linecap="round"/><rect x="23" y="30" width="10" height="12" rx="3" fill="#c8f135" opacity="0.65"/></svg>',
  back:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><path d="M18 10 C12 15 10 24 12 32 C14 38 20 44 28 44 C36 44 42 38 44 32 C46 24 44 15 38 10 C35 8 31 7 28 7 C25 7 21 8 18 10Z" fill="#c8f135"/><line x1="28" y1="10" x2="28" y2="43" stroke="#111" stroke-width="1.8" opacity="0.45"/><path d="M20 18 Q28 22 36 18" stroke="#111" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/><path d="M18 26 Q28 30 38 26" stroke="#111" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/></svg>',
  legs:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><rect x="16" y="8" width="10" height="26" rx="4" fill="#c8f135"/><rect x="30" y="8" width="10" height="26" rx="4" fill="#c8f135"/><path d="M16 28 L14 46 L22 46 L26 32" stroke="#c8f135" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M40 28 L42 46 L34 46 L30 32" stroke="#c8f135" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
  arms:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><path d="M36 9 C28 7 20 13 18 21 C16 27 18 34 23 38 L23 47 L33 47 L33 38 C40 34 44 26 42 18 C41 13 39 10 36 9Z" fill="#c8f135"/><path d="M23 30 C26 34 30 34 33 32" stroke="#111" stroke-width="2" stroke-linecap="round" opacity="0.5"/></svg>',
  cycling:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><circle cx="14" cy="36" r="9" stroke="#c8f135" stroke-width="2.5" fill="none"/><circle cx="42" cy="36" r="9" stroke="#c8f135" stroke-width="2.5" fill="none"/><path d="M28 16 L42 36 L28 36 L20 26 Z" fill="#c8f135"/><circle cx="28" cy="16" r="4" fill="#c8f135"/></svg>',
  walking:'<svg width="28" height="28" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="10" fill="#1e1e1e"/><circle cx="28" cy="9" r="5" fill="#c8f135"/><path d="M28 15 L26 27 L18 37" stroke="#c8f135" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M26 27 L34 37" stroke="#c8f135" stroke-width="3" stroke-linecap="round"/><path d="M22 21 L34 24" stroke="#c8f135" stroke-width="3" stroke-linecap="round"/></svg>'
};
var DAY_ICO=["chest","shoulders","back","legs","arms","cycling","walking"];

function gs(){try{return JSON.parse(localStorage.getItem("wt4")||"{}")}catch(e){return{}}}
function ss(d){localStorage.setItem("wt4",JSON.stringify(d))}
function iso(d){
  var y=d.getFullYear();
  var m=String(d.getMonth()+1).padStart(2,"0");
  var day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}

function getMon(ref){
  var d=new Date(ref);
  d.setHours(12,0,0,0);
  var dow=d.getDay();
  d.setDate(d.getDate()+(dow===0?-6:1-dow));
  d.setHours(12,0,0,0);
  return d;
}
function weekDates(mon){
  return Array.from({length:7},function(_,i){
    var d=new Date(mon);
    d.setDate(mon.getDate()+i);
    d.setHours(12,0,0,0);
    return d;
  });
}
function dowOf(date){var d=date.getDay();return d===0?6:d-1}
function dayKey(date){return iso(date)+"_d"+dowOf(date)}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);r.setHours(12,0,0,0);return r}

var _now=new Date();_now.setHours(12,0,0,0);
var viewMon=getMon(_now);
var curDate=new Date(_now);
var editingDay=-1;
var calViewY,calViewM;
var currentTab="workout";

function switchTab(tab){
  currentTab=tab;
  document.getElementById("pgWorkout").classList.toggle("active",tab==="workout");
  document.getElementById("pgDash").classList.toggle("active",tab==="dash");
  document.getElementById("tabWorkout").classList.toggle("active",tab==="workout");
  document.getElementById("tabDash").classList.toggle("active",tab==="dash");
  document.getElementById("saveBar").style.display=tab==="workout"?"flex":"none";
  document.getElementById("wstrip").style.display=tab==="workout"?"flex":"none";
  document.getElementById("pageTitle").textContent=tab==="workout"?"Workout":"Progress";
  if(tab==="dash")renderDash();
}

function buildStrip(){
  var strip=document.getElementById("wstrip");
  strip.innerHTML="";
  var dates=weekDates(viewMon);
  var store=gs();
  var todayStr=iso(new Date());
  var curStr=iso(curDate);
  dates.forEach(function(d,i){
    var dk=dayKey(d),ds=iso(d);
    var hasData=store[dk]&&((store[dk].sets&&Object.values(store[dk].sets).some(function(s){return s.reps>0}))||(store[dk].activity&&store[dk].activity.type));
    var pill=document.createElement("button");
    var cls="day-pill";
    if(ds===curStr)cls+=" active";
    if(ds===todayStr&&ds!==curStr)cls+=" is-today";
    if(hasData)cls+=" has-log";
    pill.className=cls;
    pill.innerHTML='<span class="dl">'+DAYS_S[i]+'</span><span class="dn">'+d.getDate()+'</span><span class="dd"></span>';
    (function(dd){pill.onclick=function(){curDate=new Date(dd);buildStrip();renderDay()}})(d);
    strip.appendChild(pill);
  });
}

function renderDay(){
  buildStrip();
  var dow=dowOf(curDate),dk=dayKey(curDate);
  var store=gs(),dayData=store[dk]||{};
  var content=document.getElementById("dayContent");
  if(WEEKEND.indexOf(dow)>=0)renderWeekend(content,dayData,dow);
  else renderWeekday(content,dayData,dow,store,dk);
}

function renderWeekday(container,dayData,idx,store,dk){
  var plan=(store.plans||{})[idx]||[];
  var sets=dayData.sets||{};
  var prs=checkPRs(idx,dk,sets,plan,store);
  var done=0,total=plan.length*4;
  plan.forEach(function(_,ei){for(var s=0;s<4;s++){if(sets[ei+"_"+s]&&sets[ei+"_"+s].reps>0)done++}});
  var pct=total?Math.round(done/total*100):0;
  var clr=DAY_CLR[idx];
  var html='<div class="day-hero"><div class="day-icon-wrap" style="background:'+clr+'1a;border:.5px solid '+clr+'44">'+MUSCLE_SVG[DAY_ICO[idx]]+'</div>';
  html+='<div><div class="day-name">'+DAYS_F[idx]+'</div><div class="day-muscle" style="color:'+clr+'">'+MUSCLE_LABEL[idx]+' WORKOUT</div></div></div>';
  if(prs.length)html+='<div class="pr-banner"><div style="font-size:20px;flex-shrink:0">&#127942;</div><div class="pr-text">'+prs.join("<br>")+'</div></div>';
  if(total)html+='<div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div>';
  if(!plan.length){
    html+='<div class="empty-state"><div style="margin-bottom:10px">'+MUSCLE_SVG[DAY_ICO[idx]]+'</div>No exercises planned.<br>Tap the edit button below.</div>';
  } else if(idx===4){
    html+=renderFriday(plan,sets,idx);
  } else {
    plan.forEach(function(name,ei){html+=renderExCard(name,ei,sets,idx,false)});
  }
  container.innerHTML=html;
  document.getElementById("btnPlan").style.display="flex";
  document.getElementById("btnSave").textContent="Save day";
}

function renderExCard(name,ei,sets,idx,compact){
  var rowCls=compact?"ss-set-row":"set-row";
  var numCls=compact?"ss-set-num":"set-num";
  var headCls=compact?"ss-sets-head":"sets-head";
  var inpCls=compact?"ss-inp":"set-inp";
  var rows="";
  for(var s=0;s<4;s++){
    var k=ei+"_"+s,sv=sets[k]||{};
    var isDone=sv.reps>0&&sv.kg>0;
    var rC=isDone?"done":(sv.reps>0?"filled":"");
    var kC=isDone?"done":(sv.kg>0?"filled":"");
    var aC=sv.asst>0?"filled":"";
    rows+='<div class="'+rowCls+'"><div class="'+numCls+'">'+( s+1)+'</div>';
    rows+='<input class="'+inpCls+' '+rC+'" type="number" inputmode="decimal" placeholder="-" value="'+( sv.reps>0?sv.reps:"")+'" data-ei="'+ei+'" data-s="'+s+'" data-t="r" data-day="'+idx+'" onchange="saveInp(this)" onfocus="this.select()">';

function saveInp(input){
  var ei=input.dataset.ei,s=input.dataset.s,t=input.dataset.t,dayI=parseInt(input.dataset.day);
  var val=parseFloat(input.value)||0;
  var store=gs(),dk=dayKey(curDate);
  if(!store[dk])store[dk]={};
  if(!store[dk].sets)store[dk].sets={};
  var k=ei+"_"+s;
  if(!store[dk].sets[k])store[dk].sets[k]={};
  if(t==="r")store[dk].sets[k].reps=val;
  else if(t==="k")store[dk].sets[k].kg=val;
  else store[dk].sets[k].asst=val;
  ss(store);
  var sv=store[dk].sets[k];
  var isDone=sv.reps>0&&sv.kg>0;
  input.classList.toggle("filled",val>0&&!isDone);
  input.classList.toggle("done",isDone&&(t==="r"||t==="k"));
  ["r","k","a"].forEach(function(type){
    var sib=document.querySelector('input[data-ei="'+ei+'"][data-s="'+s+'"][data-t="'+type+'"][data-day="'+dayI+'"]');
    if(!sib)return;
    var sv2=parseFloat(sib.value)||0;
    if(type==="r"||type==="k"){sib.classList.toggle("done",isDone);sib.classList.toggle("filled",sv2>0&&!isDone)}
  });
  updateProg();buildStrip();
}

function updateProg(){
  var store=gs(),dk=dayKey(curDate),dow=dowOf(curDate);
  var plan=(store.plans||{})[dow]||[],sets=(store[dk]||{}).sets||{};
  var done=0,total=plan.length*4;
  plan.forEach(function(_,ei){for(var s=0;s<4;s++){if(sets[ei+"_"+s]&&sets[ei+"_"+s].reps>0)done++}});
  var bar=document.querySelector(".prog-bar");
  if(bar)bar.style.width=(total?Math.round(done/total*100):0)+"%";
}

function checkPRs(dayIdx,curDk,curSets,plan,store){
  var msgs=[];
  var pastKeys=Object.keys(store).filter(function(k){return k!==curDk&&k.slice(-2)==="_d"+dayIdx&&store[k]&&store[k].sets});
  plan.forEach(function(name,ei){
    var bestReps=0,bestKg=0;
    pastKeys.forEach(function(pk){
      for(var s=0;s<4;s++){var ps=(store[pk].sets||{})[ei+"_"+s]||{};if((ps.reps||0)>bestReps)bestReps=ps.reps||0;if((ps.kg||0)>bestKg)bestKg=ps.kg||0}
    });
    var repsT=0,kgT=0;
    for(var s=0;s<4;s++){var cs=curSets[ei+"_"+s]||{};if((cs.reps||0)>repsT)repsT=cs.reps||0;if((cs.kg||0)>kgT)kgT=cs.kg||0}
    if(bestReps>0&&repsT>bestReps)msgs.push("New rep PR - "+(name||"Ex "+(ei+1))+": "+repsT+" reps!");
    if(bestKg>0&&kgT>bestKg)msgs.push("New weight PR - "+(name||"Ex "+(ei+1))+": "+kgT+"kg!");
  });
  return msgs.filter(function(v,i,a){return a.indexOf(v)===i}).slice(0,3);
}

function renderDash(){
  var store=gs();
  var allWK=Object.keys(store).filter(function(k){
    return /^\d{4}-\d{2}-\d{2}_d\d$/.test(k)&&store[k]&&store[k].sets&&Object.values(store[k].sets).some(function(s){return s.reps>0});
  });
  var totalW=allWK.length,totalVol=0;
  allWK.forEach(function(k){var tsets=Object.values(store[k].sets||{});for(var ti=0;ti<tsets.length;ti++){totalVol+=(tsets[ti].reps||0)*(tsets[ti].kg||0)}});

  var streak=0,chk=new Date();chk.setHours(0,0,0,0);
  for(var i=0;i<365;i++){
    var dow=dowOf(chk);
    if(WEEKEND.indexOf(dow)<0){
      var dk=dayKey(chk);
      if(store[dk]&&store[dk].sets&&Object.values(store[dk].sets).some(function(s){return s.reps>0}))streak++;
      else if(i>0)break;
    }
    chk=addDays(chk,-1);
  }

  var prMap={};
  allWK.forEach(function(k){
    var dow=parseInt(k.slice(-1)),plan=(store.plans||{})[dow]||[];
    Object.entries(store[k].sets||{}).forEach(function(e){
      var ei=parseInt(e[0].split("_")[0]),sv=e[1];
      var nm=plan[ei]||("Exercise "+(ei+1));
      if(sv.kg>0&&(!prMap[nm]||sv.kg>prMap[nm]))prMap[nm]=sv.kg;
    });
  });
  var topPRs=Object.entries(prMap).sort(function(a,b){return b[1]-a[1]}).slice(0,5);

  var hmStart=getMon(addDays(new Date(),-12*7));
  var hmData=[];
  for(var w=0;w<13;w++){
    var col=[];
    for(var d=0;d<7;d++){
      var day=addDays(hmStart,w*7+d),dk=dayKey(day),vol=0;
      if(store[dk]&&store[dk].sets){var hsets=Object.values(store[dk].sets);for(var hi=0;hi<hsets.length;hi++){vol+=(hsets[hi].reps||0)*(hsets[hi].kg||0)}}
      var lv=0;if(vol>0)lv=1;if(vol>2000)lv=2;if(vol>5000)lv=3;if(vol>10000)lv=4;
      col.push({lv:lv,day:day});
    }
    hmData.push(col);
  }

  var weekVols=[];
  for(var w=7;w>=0;w--){
    var wm=getMon(addDays(new Date(),-w*7));
    var wvol=0;
    for(var d=0;d<7;d++){
      var wday=addDays(wm,d),wdk=dayKey(wday);
      if(store[wdk]&&store[wdk].sets){
        var wsets=Object.values(store[wdk].sets);
        for(var si=0;si<wsets.length;si++){wvol+=(wsets[si].reps||0)*(wsets[si].kg||0)}
      }
    }
    weekVols.push({lbl:w===0?"This week":wm.toLocaleDateString("en-US",{month:"short",day:"numeric"}),vol:wvol,isNow:w===0});
  }
  var maxVol=Math.max.apply(null,weekVols.map(function(w){return w.vol}).concat([1]));
  function vs(v){return v>=1000?(v/1000).toFixed(1)+"k kg":v>0?v+" kg":"-"}

  var html='<div class="dash-title">Progress</div><div class="dash-sub">All-time stats from your logged workouts</div>';
  html+='<div class="stat-grid">';
  html+='<div class="stat-card"><div class="stat-ico">&#128293;</div><div class="stat-val">'+streak+'</div><div class="stat-lbl">Day Streak</div><div class="stat-desc">consecutive training days</div></div>';
  html+='<div class="stat-card"><div class="stat-ico">&#127947;</div><div class="stat-val">'+totalW+'</div><div class="stat-lbl">Total Workouts</div><div class="stat-desc">logged since you started</div></div>';
  html+='<div class="stat-card wide"><div><div class="stat-ico">&#128200;</div></div><div><div class="stat-val">'+vs(Math.round(totalVol))+'</div><div class="stat-lbl">Total Volume Lifted</div><div class="stat-desc">reps x kg, all workouts ever</div></div></div>';
  html+='</div>';

  html+='<div class="card"><div class="card-body"><div class="sect-lbl">Training heatmap - last 13 weeks</div>';
  html+='<div style="font-size:11px;color:var(--text4);margin-bottom:10px">Each square = one day. Darker = more volume.</div>';
  var DAY_ROW_LABELS=["M","T","W","T","F","S","S"];
  // cell = 14px, gap = 3px, label row = 16px + 3px gap = 19px total before first cell
  html+='<div style="display:flex;gap:4px">';
  // Left column: day labels - aligned to cell centers
  html+='<div style="display:flex;flex-direction:column;padding-top:19px;gap:3px;flex-shrink:0">';
  DAY_ROW_LABELS.forEach(function(dl){
    html+='<div style="width:10px;height:14px;font-size:9px;color:#c8f135;font-weight:700;display:flex;align-items:center">'+dl+'</div>';
  });
  html+='</div>';
  // Right: week columns
  html+='<div style="overflow-x:auto">';
  // Week label row: show every label with proper spacing
  html+='<div style="display:flex;gap:3px;margin-bottom:3px;height:16px">';
  hmData.forEach(function(col,wi){
    // Show label every 2 weeks to avoid overlap on small screens
    var lbl=wi%2===0?col[0].day.toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
    html+='<div style="width:14px;font-size:8px;color:#c8f135;font-weight:600;white-space:nowrap;overflow:visible">'+lbl+'</div>';
  });
  html+='</div>';
  // 7 day rows
  for(var dr=0;dr<7;dr++){
    html+='<div style="display:flex;gap:3px;margin-bottom:3px">';
    for(var wc=0;wc<hmData.length;wc++){
      var hmcell=hmData[wc][dr];
      html+='<div class="hm-cell'+( hmcell.lv?" lv"+hmcell.lv:"")+'"></div>';
    }
    html+='</div>';
  }
  html+='</div></div>';
  html+='<div class="hm-legend">Less <div class="hm-cell"></div><div class="hm-cell lv1"></div><div class="hm-cell lv2"></div><div class="hm-cell lv3"></div><div class="hm-cell lv4"></div> More</div>';
  html+='</div></div>';

  html+='<div class="card"><div class="card-body"><div class="sect-lbl">Weekly volume</div>';
  html+='<div style="font-size:11px;color:var(--text4);margin-bottom:10px">Total reps x kg per week</div>';
  weekVols.forEach(function(w){
    var pct=Math.round(w.vol/maxVol*100);
    html+='<div class="vol-row"><span class="vol-wlbl" style="color:#c8f135;font-weight:'+( w.isNow?"700":"500")+'">'+w.lbl+'</span>';
    html+='<div class="vol-bar-bg"><div class="vol-bar-fill" style="width:'+pct+'%'+( w.isNow?";background:var(--accent)":"")+'"></div></div>';
    html+='<span class="vol-val">'+vs(w.vol)+'</span></div>';
  });
  html+='</div></div>';

  html+='<div class="card"><div class="card-body"><div class="sect-lbl">Personal records</div>';
  html+='<div style="font-size:11px;color:var(--text4);margin-bottom:10px">Heaviest set per exercise, all time</div>';
  if(topPRs.length){
    topPRs.forEach(function(e){html+='<div class="pr-row"><span class="pr-name">&#127942; '+e[0]+'</span><span class="pr-val">'+e[1]+' kg</span></div>'});
  } else {
    html+='<div style="font-size:13px;color:var(--text3);padding:10px 0">Log some workouts to see PRs here.</div>';
  }
  html+='</div></div>';
  document.getElementById("dashContent").innerHTML=html;
}

function restoreFromText(){
  var text=document.getElementById("restoreArea").value.trim();
  if(!text){showToast("Paste your JSON first");return}
  try{
    var raw=JSON.parse(text);
    var data=raw;
    var keys=Object.keys(raw);
    var isDirect=keys.some(function(k){return /^\d{4}-\d{2}-\d{2}_d\d$/.test(k)||k==="plans"});
    if(!isDirect){
      var oldKeys=["gymdata_ro","gymdata","wt3","wt4"];
      for(var i=0;i<oldKeys.length;i++){if(raw[oldKeys[i]]){data=raw[oldKeys[i]];break}}
    }
    if(data.plans){
      var np={};
      Object.keys(data.plans).forEach(function(k){np[parseInt(k)]=data.plans[k]});
      data.plans=np;
    }
    ss(data);
    document.getElementById("restoreArea").value="";
    closeSheet("backupSheet");
    viewMon=getMon(curDate);
    buildStrip();
    renderDay();
    showToast("Backup restored ✓");
  }catch(err){
    showToast("Invalid JSON - check your paste");
    console.error(err);
  }
}

function importBackup(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var raw=JSON.parse(ev.target.result);
      // Detect old backup format and migrate keys to current format (wt4)
      // Old keys used: gymdata_ro, gymdata, wt3, wt4
      // A valid backup either:
      // A) already has wt4 format (keys like "2026-06-11_d3" and "plans")
      // B) IS the wt4 object directly (has keys matching date pattern or "plans")
      var data=raw;
      // Check if raw looks like a wt4-style object directly
      var keys=Object.keys(raw);
      var looksLikeDirect=keys.some(function(k){return /^\d{4}-\d{2}-\d{2}_d\d$/.test(k)||k==="plans"});
      if(!looksLikeDirect){
        // Maybe it's wrapped under an old storage key
        var oldKeys=["gymdata_ro","gymdata","wt3","wt4"];
        for(var i=0;i<oldKeys.length;i++){
          if(raw[oldKeys[i]]){
            data=raw[oldKeys[i]];
            break;
          }
        }
      }
      // Migrate old set format if needed
      // Old format stored reps/weight as strings or used different field names
      if(data.plans){
        // plans might be array-indexed object - normalize
        var newPlans={};
        Object.keys(data.plans).forEach(function(k){
          newPlans[parseInt(k)]=data.plans[k];
        });
        data.plans=newPlans;
      }
      // Migrate workout entries: old format may use .weight instead of .kg
      Object.keys(data).forEach(function(k){
        if(/^\d{4}-\d{2}-\d{2}_d\d$/.test(k)&&data[k].sets){
          Object.keys(data[k].sets).forEach(function(sk){
            var sv=data[k].sets[sk];
            // Convert string values to numbers
            if(typeof sv.reps==="string")sv.reps=parseFloat(sv.reps)||0;
            if(typeof sv.kg==="string")sv.kg=parseFloat(sv.kg)||0;
            if(typeof sv.weight!=="undefined"&&typeof sv.kg==="undefined"){
              sv.kg=parseFloat(sv.weight)||0;
              delete sv.weight;
            }
            // Old format: sets stored as {reps, weight} inside arrays
            if(typeof sv.reps==="undefined"&&typeof sv[0]!=="undefined"){
              sv.reps=parseFloat(sv[0])||0;
              sv.kg=parseFloat(sv[1])||0;
            }
          });
        }
      });
      ss(data);
      document.getElementById("importFile").value="";
      closeSheet("backupSheet");
      viewMon=getMon(curDate);
      buildStrip();
      renderDay();
      showToast("Backup restored ✓");
    }catch(err){
      console.error("Restore error:",err);
      showToast("Could not read backup file");
    }
  };
  reader.readAsText(file);
}

document.getElementById("btnCal").onclick=function(){
  var now=new Date();calViewY=now.getFullYear();calViewM=now.getMonth();
  renderCal();document.getElementById("calSheet").classList.add("open");
};
document.getElementById("calSheet").onclick=function(e){if(e.target===this)closeSheet("calSheet")};
document.getElementById("calPrev").onclick=function(){calViewM--;if(calViewM<0){calViewM=11;calViewY--}renderCal()};
document.getElementById("calNext").onclick=function(){calViewM++;if(calViewM>11){calViewM=0;calViewY++}renderCal()};
function renderCal(){
  document.getElementById("calWdays").innerHTML=["M","T","W","T","F","S","S"].map(function(w){
    return'<div style="font-size:10px;font-weight:700;color:var(--text4);text-align:center;padding:2px 0">'+w+'</div>';
  }).join("");
  var store=gs(),todayStr=iso(new Date()),curStr=iso(curDate);
  document.getElementById("calMonthLbl").textContent=new Date(calViewY,calViewM,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  var first=new Date(calViewY,calViewM,1);
  var sd=first.getDay();sd=sd===0?6:sd-1;
  var dim=new Date(calViewY,calViewM+1,0).getDate();
  var cells="";
  for(var i=0;i<sd;i++)cells+='<div style="height:36px"></div>';
  for(var day=1;day<=dim;day++){
    var date=new Date(calViewY,calViewM,day),ds=iso(date),dk=dayKey(date);
    var hasLog=store[dk]&&((store[dk].sets&&Object.values(store[dk].sets).some(function(s){return s.reps>0}))||(store[dk].activity&&store[dk].activity.type));
    var isT=ds===todayStr,isSel=ds===curStr;
    var bg=isSel?"var(--accent)":"none";
    var col=isSel?"#000":(isT?"var(--accent)":"var(--text3)");
    var fw=isSel||isT?"700":"500";
    var bdr=isT&&!isSel?"1.5px solid var(--accent)":"none";
    var dot=hasLog?'<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:'+(isSel?"#000":"var(--accent)")+'"></span>':"";
    cells+='<div data-ds="'+ds+'" onclick="calGo(this)" style="height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;background:'+bg+';color:'+col+';font-weight:'+fw+';border:'+bdr+';position:relative">'+day+dot+'</div>';
  }
  document.getElementById("calGrid").innerHTML=cells;
}
function calGo(el){
  var ds=el.dataset.ds;
  curDate=new Date(ds+"T12:00:00");
  viewMon=getMon(new Date(curDate));
  closeSheet("calSheet");switchTab("workout");buildStrip();renderDay();
}

function closeSheet(id){document.getElementById(id).classList.remove("open")}
function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},1800);
}

(function(){
  var store=gs();
  if(!store.plans){
    store.plans={
      0:["Bench Press","Incline Dumbbell Press","Cable Fly","Dips"],
      1:["Overhead Press","Lateral Raises","Front Raises","Face Pulls"],
      2:["Pull-ups","Barbell Row","Cable Row","Lat Pulldown"],
      3:["Squat","Romanian Deadlift","Leg Press","Leg Curl"],
      4:["Barbell Curl","Hammer Curl","Skull Crushers","Tricep Pushdown","Cable Curl","Close-Grip Bench"]
    };ss(store);
  }
  buildStrip();renderDay();
})();
</script>
